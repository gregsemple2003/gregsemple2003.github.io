<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Share Join Token</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }

    main {
      width: min(30rem, calc(100vw - 2rem));
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 650;
    }

    a,
    button,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid ButtonBorder;
      border-radius: 8px;
      font: inherit;
    }

    textarea {
      min-height: 7rem;
      padding: 0.75rem;
      resize: vertical;
    }

    a {
      display: block;
      margin-top: 1rem;
      padding: 0.75rem;
      color: LinkText;
      overflow-wrap: anywhere;
    }

    button {
      min-height: 3.25rem;
      margin-top: 1rem;
      background: ButtonFace;
      color: ButtonText;
      font-weight: 650;
      cursor: pointer;
    }

    #status {
      min-height: 1.5rem;
      margin: 1rem 0 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <label for="source">Join Token</label>
    <textarea id="source" autocomplete="off" spellcheck="false"></textarea>
    <a id="shareLink" href="copy.html">copy.html</a>
    <button id="copy" type="button">Copy Share Link</button>
    <p id="status" role="status" aria-live="polite">Paste a join token, then copy the share link.</p>
  </main>

  <script>
    const parameterName = "text";
    const defaultText = "asdf";
    const source = document.getElementById("source");
    const shareLink = document.getElementById("shareLink");
    const button = document.getElementById("copy");
    const status = document.getElementById("status");

    function getInitialText() {
      const params = new URLSearchParams(window.location.search);
      return params.get(parameterName) ?? defaultText;
    }

    function buildShareUrl() {
      const url = new URL("copy.html", window.location.href);
      url.searchParams.set(parameterName, source.value);
      return url.href;
    }

    function updateShareLink() {
      const href = buildShareUrl();
      shareLink.href = href;
      shareLink.textContent = href;
    }

    async function copyShareLink() {
      const copyValue = buildShareUrl();

      try {
        await navigator.clipboard.writeText(copyValue);
        status.textContent = "Copied share link.";
      } catch (error) {
        shareLink.focus();
        status.textContent = "Clipboard access was blocked. The share link is shown above.";
      }
    }

    source.value = getInitialText();
    updateShareLink();
    source.addEventListener("input", updateShareLink);
    button.addEventListener("click", copyShareLink);
  </script>
</body>
</html>
