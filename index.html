<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copy GET Parameter</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }

    main {
      width: min(30rem, calc(100vw - 2rem));
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 650;
    }

    button,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid ButtonBorder;
      border-radius: 8px;
      font: inherit;
    }

    textarea {
      min-height: 7rem;
      padding: 0.75rem;
      resize: vertical;
    }

    button {
      min-height: 3.25rem;
      margin-top: 1rem;
      background: ButtonFace;
      color: ButtonText;
      font-weight: 650;
      cursor: pointer;
    }

    #status {
      min-height: 1.5rem;
      margin: 1rem 0 0;
      text-align: center;
    }

    #fallback {
      margin-top: 1rem;
      min-height: 4rem;
    }
  </style>
</head>
<body>
  <main>
    <label for="source">String</label>
    <textarea id="source" autocomplete="off" spellcheck="false"></textarea>
    <button id="copy" type="button">Copy URL</button>
    <p id="status" role="status" aria-live="polite">Loading will try to copy; click the button if the browser blocks it.</p>
    <textarea id="fallback" readonly hidden></textarea>
  </main>

  <script>
    const parameterName = "text";
    const defaultText = "asdf";
    const source = document.getElementById("source");
    const button = document.getElementById("copy");
    const status = document.getElementById("status");
    const fallback = document.getElementById("fallback");

    function getInitialText() {
      const params = new URLSearchParams(window.location.search);
      return params.get(parameterName) ?? defaultText;
    }

    function buildCopyValue() {
      const encoded = encodeURIComponent(source.value);
      return `${window.location.origin}${window.location.pathname}?${parameterName}=${encoded}`;
    }

    async function copyText(event) {
      const copyValue = buildCopyValue();

      try {
        await navigator.clipboard.writeText(copyValue);
        status.textContent = event ? "Copied URL." : "Copied URL on load.";
        fallback.hidden = true;
      } catch (error) {
        fallback.hidden = false;
        fallback.value = copyValue;
        fallback.focus();
        fallback.select();
        status.textContent = event
          ? "Clipboard access was blocked. The URL is selected below."
          : "Clipboard copy on load was blocked. Click the button to copy the URL.";
      }
    }

    source.value = getInitialText();
    button.addEventListener("click", copyText);
    window.addEventListener("DOMContentLoaded", () => copyText());
  </script>
</body>
</html>
