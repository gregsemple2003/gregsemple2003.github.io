<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copy asdf</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }

    main {
      width: min(28rem, calc(100vw - 2rem));
      text-align: center;
    }

    button {
      width: 100%;
      min-height: 3.25rem;
      border: 1px solid ButtonBorder;
      border-radius: 8px;
      background: ButtonFace;
      color: ButtonText;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    #status {
      min-height: 1.5rem;
      margin: 1rem 0 0;
    }

    textarea {
      width: 100%;
      min-height: 4rem;
      margin-top: 1rem;
      box-sizing: border-box;
      font: inherit;
    }
  </style>
</head>
<body>
  <main>
    <button id="copy" type="button">Copy asdf</button>
    <p id="status" role="status" aria-live="polite">Loading will try to copy; click the button if the browser blocks it.</p>
    <textarea id="fallback" readonly hidden>asdf</textarea>
  </main>

  <script>
    const textToCopy = "asdf";
    const button = document.getElementById("copy");
    const status = document.getElementById("status");
    const fallback = document.getElementById("fallback");

    async function copyText(event) {
      try {
        await navigator.clipboard.writeText(textToCopy);
        status.textContent = event ? "Copied asdf." : "Copied asdf on load.";
        fallback.hidden = true;
      } catch (error) {
        fallback.hidden = false;
        fallback.focus();
        fallback.select();
        status.textContent = event
          ? "Clipboard access was blocked. The text is selected below."
          : "Clipboard copy on load was blocked. Click the button to copy asdf.";
      }
    }

    button.addEventListener("click", copyText);
    window.addEventListener("DOMContentLoaded", () => copyText());
  </script>
</body>
</html>
