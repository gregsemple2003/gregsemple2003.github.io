<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copy Join Token</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }

    main {
      width: min(30rem, calc(100vw - 2rem));
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 650;
    }

    button,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid ButtonBorder;
      border-radius: 8px;
      font: inherit;
    }

    textarea {
      min-height: 7rem;
      padding: 0.75rem;
      resize: vertical;
    }

    button {
      min-height: 3.25rem;
      margin-top: 1rem;
      background: ButtonFace;
      color: ButtonText;
      font-weight: 650;
      cursor: pointer;
    }

    #status {
      min-height: 1.5rem;
      margin: 1rem 0 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <label for="source">Join Token</label>
    <textarea id="source" autocomplete="off" spellcheck="false"></textarea>
    <button id="copy" type="button">Copy Token</button>
    <p id="status" role="status" aria-live="polite">Click the button to copy the join token.<br>Then press F7 in-game and click "Join".</p>
  </main>

  <script>
    const parameterName = "text";
    const defaultText = "asdf";
    const source = document.getElementById("source");
    const button = document.getElementById("copy");
    const status = document.getElementById("status");

    function getInitialText() {
      const params = new URLSearchParams(window.location.search);
      return params.get(parameterName) ?? defaultText;
    }

    async function copyText() {
      const copyValue = source.value;

      try {
        await navigator.clipboard.writeText(copyValue);
        status.textContent = 'Copied token. Press F7 in-game and click "Join".';
      } catch (error) {
        source.focus();
        source.select();
        status.textContent = "Clipboard access was blocked. The join token is selected above.";
      }
    }

    source.value = getInitialText();
    button.addEventListener("click", copyText);
  </script>
</body>
</html>
